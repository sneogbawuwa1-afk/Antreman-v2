<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0a0a12;color:#e2e2e8;min-height:100vh;padding-bottom:60px}
.nav{background:#0d0d1a;border-bottom:1px solid #1e1e30;padding:14px 16px 0;position:sticky;top:0;z-index:100}
.nav-header{max-width:680px;margin:0 auto;position:relative}
.nav-title{font-size:11px;letter-spacing:3px;color:#666;text-transform:uppercase;margin-bottom:4px}
.nav-sub{font-size:19px;font-weight:700;color:#fff;margin-bottom:14px}

/* Geri Sayım Sayacı Stili */


.home-btn {position:absolute;top:0;right:0;background:#161625;border:1px solid #222235;border-radius:8px;padding:6px 12px;color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;gap:6px;cursor:pointer;text-decoration:none;transition:background .15s}
.home-btn:hover {background:#1e1e33}

.week-selector-title {font-size:10px;letter-spacing:1px;color:#555;text-transform:uppercase;margin-bottom:6px;font-weight:700}
.week-nav-tabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:8px;margin-bottom:8px;scrollbar-width:none}
.week-nav-tabs::-webkit-scrollbar{display:none}
.week-nav-tab{background:#161625;border:1px solid #222235;border-radius:6px;padding:6px 12px;color:#777;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap}
.week-nav-tab.active{background:#fff;color:#000;border-color:#fff}

.day-tabs{display:flex;gap:2px;border-top:1px solid #1e1e30;margin:0 -16px}
.day-tab{flex:1;background:none;border:none;border-bottom:2px solid transparent;padding:10px 4px 10px;color:#444;font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .15s;font-family:inherit}
.day-tab.active{color:#fff}
.main{max-width:680px;margin:0 auto;padding:14px 16px 0}

.day-banner {border-radius:12px;padding:14px 16px;margin-bottom:12px;border-left:3px solid;display:flex;align-items:center;gap:14px}
.day-banner-text{flex:1}
.day-focus{font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:3px}
.day-name{font-size:15px;font-weight:800;color:#fff}
.progress-wrap{display:flex;align-items:center;gap:10px;margin-top:10px}
.progress-bar{flex:1;height:4px;background:#1e1e30;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .3s}
.progress-label{font-size:11px;color:#555;white-space:nowrap}

.tabs-secondary{display:flex;gap:6px;margin-bottom:12px}
.tab-sec{flex:1;background:#0f0f1c;border:1px solid #1e1e30;border-radius:8px;padding:8px;text-align:center;font-size:12px;color:#555;cursor:pointer;font-weight:600;transition:all .15s}
.tab-sec.active{color:#fff;border-color:#333}

.exercise-card{background:#0f0f1c;border:1px solid #1e1e30;border-radius:12px;margin-bottom:8px;overflow:hidden;transition:border-color .2s}
.exercise-card.done{opacity:.85;border-color:#223322}
.ex-main{padding:13px 14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.ex-check{width:22px;height:22px;border-radius:7px;border:2px solid #2a2a3a;background:transparent;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:#000;font-weight:800;transition:all .15s}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:13px;font-weight:700;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.done .ex-name{text-decoration:line-through;color:#666}
.badges{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.badge{border-radius:5px;padding:2px 8px;font-size:10px;font-weight:700}
.badge-1rm{background:#3b82f620;color:#60a5fa;border:1px dashed #3b82f650;font-size:10px;padding:1px 6px;border-radius:5px;font-weight:700}

/* Set Satırları Alanı */
.sets-container {width:100%;margin-top:12px;border-top:1px dashed #1e1e30;padding-top:10px;display:flex;flex-direction:column;gap:6px}
.set-row {display:flex;flex-direction:column;gap:4px;background:#141424;padding:6px 8px;border-radius:8px}
.set-row-main{display:flex;align-items:center;gap:6px}
.set-num {font-size:11px;font-weight:800;color:#555;width:18px;flex-shrink:0}
.set-prev{font-size:9px;color:#555;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.set-inputs {display:flex;gap:6px;align-items:center;flex-shrink:0;margin-left:auto}

.ex-controls{display:flex;gap:8px;align-items:center;flex-shrink:0}
.weight-box{display:flex;flex-direction:column;align-items:center;gap:2px}
.weight-label{font-size:8px;color:#444;text-transform:uppercase;letter-spacing:.5px}
.weight-input{width:52px;height:30px;background:#16161f;border:1px solid #2a2a3a;border-radius:8px;color:#888;font-size:12px;font-weight:800;text-align:center;outline:none;-webkit-appearance:none;-moz-appearance:textfield;font-family:inherit}
.weight-input:focus{border-color:#555;color:#fff}
.weight-input::placeholder{font-size:8px;color:#444;font-weight:normal}

/* Yeni Eklenen Tekrar Giriş Kutusu Stili */
.rep-input{width:40px;height:30px;background:#16161f;border:1px solid #2a2a3a;border-radius:8px;color:#888;font-size:12px;font-weight:800;text-align:center;outline:none;-webkit-appearance:none;-moz-appearance:textfield;font-family:inherit}
.rep-input:focus{border-color:#555;color:#fff}

.rpe-box{display:flex;flex-direction:column;align-items:center;gap:2px}
.rpe-select{width:46px;height:30px;background:#16161f;border:1px solid #2a2a3a;border-radius:8px;color:#888;font-size:10px;font-weight:700;text-align:center;outline:none;cursor:pointer;font-family:inherit}
.set-timer-btn{width:30px;height:30px;flex-shrink:0;background:#1a1a2e;border:1px solid #2a2a3a;border-radius:8px;color:#777;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.set-timer-btn:hover{color:#fff;border-color:#555}
.set-timer-btn:active{transform:scale(.93)}
.set-timer-btn.running{color:#ff9800;border-color:#ff980080;background:#ff980015}

/* Set satırı içi (inline) geri sayım göstergesi — KG alanının hemen solunda */
.inline-timer{display:none;align-items:center;gap:4px;background:#ff980020;border:1px solid #ff980060;border-radius:8px;padding:3px 7px;font-size:10px;font-weight:800;color:#ff9800;flex-shrink:0;white-space:nowrap}
.inline-timer .cd-bar-bg{width:20px;height:4px;background:#3a2a10;border-radius:2px;overflow:hidden;flex-shrink:0}
.inline-timer .cd-bar-fill{height:100%;background:#ff9800;width:100%;transition:width 1s linear}

.ex-footer{padding:9px 14px;border-top:1px solid #141420;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.machine-label{font-size:10px;color:#444;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-expand{background:#0c0c18;border-top:1px solid #141420}
.tip-box{padding:12px 14px 10px}
.tip-title{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.tip-text{font-size:12px;color:#888;line-height:1.7}
.yt-link{display:flex;align-items:center;gap:10px;background:#ff000015;border:1px solid #ff000040;border-radius:10px;padding:11px 14px;text-decoration:none;margin:0 14px 14px;cursor:pointer}
.yt-title{font-size:12px;font-weight:700;color:#ff4444;margin-bottom:1px}
.yt-sub{font-size:10px;color:#555}

.history-box{padding:0 14px 12px}
.history-title{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-weight:700}
.history-list{display:flex;flex-direction:column;gap:4px;background:#131322;border-radius:8px;padding:8px}
.history-row{display:flex;justify-content:space-between;font-size:11px;color:#aaa}
.history-row span{flex:1}
.history-row span:last-child{text-align:right;color:#888}

/* Matris Sekmesindeki 12 Haftalık Yatay Kaydırılabilir Alan */
.week-section{margin-top:4px}
.week-grid{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:12px;scrollbar-width:none}
.week-grid::-webkit-scrollbar{display:none}
.week-card{min-width:85px;background:#0f0f1c;border:1px solid #1e1e30;border-radius:10px;padding:10px 8px;text-align:center;cursor:pointer;transition:all .15s;flex-shrink:0}
.week-card.active{border-color:#444}
.week-num{font-size:10px;color:#444;font-weight:700;margin-bottom:5px}
.week-bar{height:3px;background:#1a1a28;border-radius:2px;margin:0 2px}
.week-bar-fill{height:100%;border-radius:2px}
.week-date{font-size:9px;color:#333;margin-top:5px}

.chart-wrap{background:#0f0f1c;border:1px solid #1e1e30;border-radius:12px;padding:14px;margin-bottom:12px}
.chart-title{font-size:12px;color:#888;margin-bottom:10px;font-weight:600}
.ex-select{width:100%;background:#16161f;border:1px solid #2a2a3a;border-radius:8px;color:#e2e2e8;font-size:12px;padding:7px 10px;outline:none;margin-bottom:12px;font-family:inherit;cursor:pointer}

.progression-table{width:100%;border-collapse:collapse;font-size:12px}
.progression-table th{color:#444;font-weight:600;text-align:left;padding:6px 8px;border-bottom:1px solid #1e1e30}
.progression-table td{padding:7px 8px;border-bottom:1px solid #141420;color:#888}
.progression-table td:first-child{color:#e2e2e8;font-weight:600}
.pr-badge{background:#22333a;color:#4af;border-radius:4px;padding:1px 5px;font-size:10px;font-weight:700}
.up-arrow{color:#4a4}
.same{color:#555}

.save-btn{width:100%;margin-top:14px;background:#fff;border:none;border-radius:12px;padding:14px;cursor:pointer;font-size:13px;font-weight:800;color:#000;letter-spacing:1px;font-family:inherit;transition:opacity .15s}
.save-btn:hover{opacity:.85}

/* Reset Butonu */
.danger-btn{width:100%;margin-top:14px;background:#ff3b3020;border:1px solid #ff3b3050;border-radius:12px;padding:12px;cursor:pointer;font-size:11px;font-weight:700;color:#ff3b30;letter-spacing:1px;font-family:inherit;transition:all .15s}
.danger-btn:hover{background:#ff3b3035}

.weekly-overview{margin-top:20px}
.overview-title{font-size:10px;letter-spacing:2px;color:#333;text-transform:uppercase;margin-bottom:10px;font-weight:700}
.overview-grid{display:flex;gap:6px}
.ov-card{flex:1;background:#0f0f1c;border:1px solid #1a1a28;border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer;transition:all .15s}
.ov-label{font-size:9px;font-weight:700;margin-bottom:6px}
.ov-bar{height:3px;background:#1a1a28;border-radius:2px;margin:0 2px}
.ov-count{font-size:9px;color:#333;margin-top:5px}

.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#fff;color:#000;padding:10px 20px;border-radius:30px;font-size:13px;font-weight:700;z-index:999;display:none;box-shadow:0 4px 20px rgba(0,0,0,.5)}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
</style>
</head>
